platform: machine

# (jhrozek): at the moment, the mount probe checks the /proc filesystem
# even if openscap looks at a chroot, which doesn't allow to check for
# mount points when checking RHCOS4 via CO
{{% if product != "rhcos4" %}}
template:
    name: mount
    vars:
        mountpoint: /var/log
{{% endif %}}